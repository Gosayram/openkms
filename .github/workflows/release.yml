name: Release

on:
  push:
    # Run only on tags
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: '**/go.sum'

      - name: Read version from .release-version
        id: version
        run: |
          if [ -f .release-version ]; then
            VERSION=$(cat .release-version | tr -d '[:space:]')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
            echo "Read version from .release-version: $VERSION"
          else
            # Fallback to tag name without 'v' prefix
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
            echo "Using tag version: $VERSION"
          fi

          # Set repository URL for GoReleaser templates
          GITHUB_REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          echo "GITHUB_REPO_URL=$GITHUB_REPO_URL" >> $GITHUB_ENV
          echo "Repository URL: $GITHUB_REPO_URL"
          
          # Set Docker repository path (lowercase owner/repo for GHCR)
          DOCKER_REPO_PATH=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "DOCKER_REPO_PATH=$DOCKER_REPO_PATH" >> $GITHUB_ENV
          echo "Docker repository path: $DOCKER_REPO_PATH"
          
          # Extract repository name (without owner) for Docker package URLs
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "Repository name: $REPO_NAME"

      # Import GPG key for signing binaries and checksums
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      # Run GoReleaser:
      # - Builds binaries (signed with GPG)
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GPG signing for binaries and checksums
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          # Repository URL for templates
          GITHUB_REPO_URL: ${{ env.GITHUB_REPO_URL }}
          # Docker repository path for templates
          DOCKER_REPO_PATH: ${{ env.DOCKER_REPO_PATH }}
          # Repository name for Docker package URLs
          REPO_NAME: ${{ env.REPO_NAME }}
          # Telegram announcement
          TELEGRAM_TOKEN: ${{ secrets.TG_RELEASER_TOKEN }}
          OPENKMS_CHAT_ID: ${{ secrets.OPENKMS_CHAT_ID }}

  build_docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
        with:
          cosign-release: 'v3.0.2'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version and metadata
        id: metadata
        run: |
          if [ -f .release-version ]; then
            VERSION=$(cat .release-version | tr -d '[:space:]')
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_NO_V=${VERSION#v}" >> $GITHUB_ENV
          
          # Generate lowercase repository name for Docker tags
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "DOCKER_REPOSITORY=$REPO_LOWER" >> $GITHUB_ENV
          
          # Get commit and date for build args
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "COMMIT=$COMMIT" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          
          echo "Version: $VERSION"
          echo "Repository: $REPO_LOWER"
          echo "Commit: $COMMIT"
          echo "Date: $DATE"

      - name: Build and push server image
        uses: docker/build-push-action@601a80b39c9405e50806ae38af30926f9d957c47 # v6.19.1
        with:
          context: .
          file: deploy/Dockerfile
          target: openkms-server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.DOCKER_REPOSITORY }}/server:${{ env.VERSION }}
            ghcr.io/${{ env.DOCKER_REPOSITORY }}/server:latest
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            DATE=${{ env.DATE }}
          labels: |
            org.opencontainers.image.title=openkms-server
            org.opencontainers.image.description=OpenKMS Key Management Service server
            org.opencontainers.image.version=${{ env.VERSION_NO_V }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.COMMIT }}
            org.opencontainers.image.created=${{ env.DATE }}

      - name: Build and push cli image
        uses: docker/build-push-action@601a80b39c9405e50806ae38af30926f9d957c47 # v6.19.1
        with:
          context: .
          file: deploy/Dockerfile
          target: openkms-cli
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.DOCKER_REPOSITORY }}/cli:${{ env.VERSION }}
            ghcr.io/${{ env.DOCKER_REPOSITORY }}/cli:latest
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            DATE=${{ env.DATE }}
          labels: |
            org.opencontainers.image.title=openkms-cli
            org.opencontainers.image.description=OpenKMS Key Management Service CLI
            org.opencontainers.image.version=${{ env.VERSION_NO_V }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.COMMIT }}
            org.opencontainers.image.created=${{ env.DATE }}

      - name: Build and push server-slim image
        uses: docker/build-push-action@601a80b39c9405e50806ae38af30926f9d957c47 # v6.19.1
        with:
          context: .
          file: deploy/Dockerfile
          target: openkms-server-slim
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.DOCKER_REPOSITORY }}/server-slim:${{ env.VERSION }}
            ghcr.io/${{ env.DOCKER_REPOSITORY }}/server-slim:latest
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            DATE=${{ env.DATE }}
          labels: |
            org.opencontainers.image.title=openkms-server-slim
            org.opencontainers.image.description=OpenKMS Key Management Service server (slim)
            org.opencontainers.image.version=${{ env.VERSION_NO_V }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.COMMIT }}
            org.opencontainers.image.created=${{ env.DATE }}

      - name: Sign server image with Cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_PASSWORD" | cosign sign --yes --key env://COSIGN_PRIVATE_KEY ghcr.io/${{ env.DOCKER_REPOSITORY }}/server:${{ env.VERSION }}
          echo "$COSIGN_PASSWORD" | cosign sign --yes --key env://COSIGN_PRIVATE_KEY ghcr.io/${{ env.DOCKER_REPOSITORY }}/server:latest

      - name: Sign cli image with Cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_PASSWORD" | cosign sign --yes --key env://COSIGN_PRIVATE_KEY ghcr.io/${{ env.DOCKER_REPOSITORY }}/cli:${{ env.VERSION }}
          echo "$COSIGN_PASSWORD" | cosign sign --yes --key env://COSIGN_PRIVATE_KEY ghcr.io/${{ env.DOCKER_REPOSITORY }}/cli:latest

      - name: Sign server-slim image with Cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_PASSWORD" | cosign sign --yes --key env://COSIGN_PRIVATE_KEY ghcr.io/${{ env.DOCKER_REPOSITORY }}/server-slim:${{ env.VERSION }}
          echo "$COSIGN_PASSWORD" | cosign sign --yes --key env://COSIGN_PRIVATE_KEY ghcr.io/${{ env.DOCKER_REPOSITORY }}/server-slim:latest

